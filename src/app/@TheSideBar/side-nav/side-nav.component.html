<div class="side-wrapper">
  <ul class="nav-list">
    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="HomeIcon"></lucide-icon>
        <span>回首頁</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="selectCategory('all')"
        [class.active]="selectedCategory === 'all'"
      >
        <lucide-icon [name]="ListIcon"></lucide-icon>
        <span>商品列表</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="togglePanel($event, 'category')"
        [class.active]="panelState.category"
      >
        <lucide-icon [name]="CirclePileIcon"></lucide-icon>
        <span>常用分類</span>
      </button>

      <div class="sub-panel" [class.show]="panelState.category">
        <ul class="sub-list">
          @for (item of categories; track $index) {
            <li>

              <button class="sub-link" (click)="selectCategory(item.value)" [class.active]="selectedCategory === item.value">
                <lucide-icon [name]="item.icon"></lucide-icon>
                <span class="sub-panel-text">{{ item.label }}</span>
              </button>
            </li>
          }
        </ul>
      </div>

    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="togglePanel($event, 'academic')"
      >
        <lucide-icon [name]="BoxIcon"></lucide-icon>
        <span>所有學群</span>
      </button>

      <div class="sub-panel" [class.show]="panelState.academic">
        <div class="sub-grid" (click)="$event.stopPropagation()">
          @for (item of academics; track $index) {
            <label
              class="sub-checkbox-item sub-panel-text"
              [class.active]="selectedDepts.includes(item.name)"
            >
              <input
                type="checkbox"
                [checked]="selectedDepts.includes(item.name)"
                (change)="toggleDept(item.name)"
              />
              {{ item.name }}
            </label>
          }
        </div>
          <button class="sub-confirm-btn" (click)="confirmDepts(); $event.stopPropagation()">
            確認選取（{{ selectedDepts.length }}）
          </button>
      </div>
    </li>



    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="SmilePlusIcon"></lucide-icon>
        <span>優良賣家</span>
      </button>
    </li>



    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MapPinIcon"></lucide-icon>
        <span>附近賣家</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MoonStarIcon"></lucide-icon>
        <span>商品許願池</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="togglePanel($event, 'school')"
        [class.active]="panelState.school"
      >
        <lucide-icon [name]="SchoolIcon"></lucide-icon>
        <span>看看校版</span>
      </button>

      <div class="sub-panel" [class.show]="panelState.school">
        <div class="school-search-wrap" (click)="$event.stopPropagation()">

          <!-- 搜尋輸入框 -->
          <input
            class="school-search-input"
            type="text"
            placeholder="輸入學校名稱..."
            [(ngModel)]="searchText"
          />

          <!-- 過濾後的學校清單 -->
          <ul class="school-list">
            @for (school of filteredSchools; track school['代碼']) {
              <li>
                <button
                  class="sub-link"
                  (click)="selectSchool(school)"
                >
                  <lucide-icon [name]="SchoolIcon"></lucide-icon>
                  <span class="sub-panel-text">{{ school['學校名稱'] }}</span>
                </button>
              </li>
            }
            @if (filteredSchools.length === 0) {
              <li class="school-empty">查無符合學校</li>
            }
          </ul>

        </div>
      </div>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToManual()"
      >
        <lucide-icon [name]="CircleQuestionMarkIcon"></lucide-icon>
        <span>網站說明</span>
      </button>
    </li>

    </ul>

  <hr class="divider">






</div>
