<div class="side-wrapper">
  <ul class="nav-list">
    @for (item of categories; track $index) {
      <li class="nav-item">
        <button
          type="button"
          class="nav-link"
          (click)="selectCategory(item.value)"
          [class.active]="selectedCategory === item.value">
          <lucide-icon [name]="item.icon"></lucide-icon>
          <span>{{item.label}}</span>
        </button>
      </li>
    }
    </ul>

  <hr class="divider">

  <div class="filter-section">
    <h4>篩選條件</h4>
    <div class="filter-row">
      <span>價格範圍</span>
      <span class="value">$0 - $20,000+ <lucide-icon [img]="ChevronDownIcon" size="16"></lucide-icon></span>
    </div>
    <div class="filter-row">
      <span>地區</span>
      <span class="value">選擇地區 <lucide-icon [img]="ChevronDownIcon" size="16"></lucide-icon></span>
    </div>
    </div>

  <div class="promo-card">
    <p class="title">讓物品找到<br>下一個好主人</p>
    <p class="slogan">Reuse, Reduce, Relove.</p>
  </div>
</div>
