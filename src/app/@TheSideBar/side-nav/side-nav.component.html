<div class="side-wrapper">
  <ul class="nav-list">
    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="HomeIcon" (click)="goToHome()"></lucide-icon>
        <span>回首頁</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="selectCategory('all')"
        [class.active]="selectedCategory === 'all'"
      >
        <lucide-icon [name]="ListIcon"></lucide-icon>
        <span>商品列表</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="togglePanel($event, 'academic')"
      >
        <lucide-icon [name]="BoxIcon"></lucide-icon>
        <span>所有學群</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="togglePanel($event, 'category')"
        [class.active]="panelState.category"
      >
        <lucide-icon [name]="CirclePileIcon"></lucide-icon>
        <span>常用分類</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="SmilePlusIcon"></lucide-icon>
        <span>優良賣家</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="SchoolIcon"></lucide-icon>
        <span>看看校板</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MapPinIcon"></lucide-icon>
        <span>附近賣家</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MoonStarIcon"></lucide-icon>
        <span>商品許願池</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToManual()"
      >
        <lucide-icon [name]="CircleQuestionMarkIcon"></lucide-icon>
        <span>使用說明</span>
      </button>
    </li>

    </ul>

  <hr class="divider">


  @if (panelState.academic) {
    <div class="academics" >
      @for (item of academics; track $index)
      {
        <button class="academy">
          {{item.name}}
        </button>
      }
    </div>
  }

  @if (panelState.category) {
  <div class="categories">
    @for (item of categories; track $index) {
      <button
        class="category"
        (click)="selectCategory(item.value)"
        [class.active]="selectedCategory === item.value"
      >
        <lucide-icon [name]="item.icon"></lucide-icon>
        <span>{{ item.label }}</span>
      </button>
    }
  </div>
}


</div>
