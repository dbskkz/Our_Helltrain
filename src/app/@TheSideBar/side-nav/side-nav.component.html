<div class="side-wrapper">
  <ul class="nav-list">
    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="HomeIcon" (click)="goToHome()"></lucide-icon>
        <span>回首頁</span>
      </button>
    </li>

      <li class="nav-item">

          type="button"
          class="nav-link"
          (click)="selectCategory(item.value)"
          [class.active]="selectedCategory === item.value">
          <lucide-icon [name]="item.icon"></lucide-icon>

      </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="selectCategory('all')"
        [class.active]="selectedCategory === 'all'"
      >
        <lucide-icon [name]="ListIcon"></lucide-icon>
        <span>商品列表</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="BoxIcon"></lucide-icon>
        <span>所有學群</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="CirclePileIcon"></lucide-icon>
        <span>常用分類</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="SmilePlusIcon"></lucide-icon>
        <span>優良賣家</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="SchoolIcon"></lucide-icon>
        <span>看看校板</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MapPinIcon"></lucide-icon>
        <span>附近賣家</span>
      </button>
    </li>

    <li class="nav-item">
      <button
        type="button"
        class="nav-link"
        (click)="goToHome()"
      >
        <lucide-icon [name]="MoonStarIcon"></lucide-icon>
        <span>商品許願池</span>
      </button>
    </li>

    </ul>

  <hr class="divider">

  <div class="filter-section">
    <h4>篩選條件</h4>
    <div class="filter-row">
      <span>價格範圍</span>
      <span class="value">$0 - $20,000+ <lucide-icon [img]="ChevronDownIcon" size="16"></lucide-icon></span>
    </div>
    <div class="filter-row">
      <span>地區</span>
      <span class="value">選擇地區 <lucide-icon [img]="ChevronDownIcon" size="16"></lucide-icon></span>
    </div>
    </div>

</div>
