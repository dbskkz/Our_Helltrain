<div class="search-container">
  <input
    type="text"
    class="search"
    [(ngModel)]="searchText"
    (ngModelChange)="onSearchChange($event)"
    placeholder="尋找同學（可輸入姓名或科系）..."
  >
</div>

<!-- 增加一個防呆與友善提示：找不到人時顯示提示 -->
@if (filteredClassmate.length > 0) {
  <app-user-card [users]="filteredClassmate"></app-user-card>
} @else {
  <section class="empty-state">

    <div class="empty-icon-wrapper">
      <span class="material-symbols-outlined">search_off</span>
    </div>

    <div class="empty-content">
      <h2>找不到同學 !</h2>
      <p class="empty-description">
        我們找不到符合 <span>"{{ searchText }}"</span> 的同學，換個關鍵字試試看吧！
      </p>
    </div>

    <div class="empty-actions">
      <button
        class="text-btn secondary-link"
        (click)="clearAllFilters($event)"
      >
        清除搜尋
      </button>

      <span class="divider">|</span>

      <button
        class="text-btn primary-link"
        routerLink="/home"
      >
        返回首頁
      </button>
    </div>

  </section>

}
