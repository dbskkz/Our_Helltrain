<div class="page-wrapper">
  <p class="page-title">商品上架</p>

  <!-- 操作步驟 -->
  <div class="stepper">
    <div class="step"  [class.active]="activeStep === 1"  (click)="setStep(1)">
      <div class="step-badge">1</div>
      <span class="step-label">商品資訊</span>
    </div>
    <div class="step"  [class.active]="activeStep === 2"  (click)="setStep(2)" >
      <div class="step-badge">2</div>
      <span class="step-label">價格與分類</span>
    </div>
    <div class="step"  [class.active]="activeStep === 3"  (click)="setStep(3)">
      <div class="step-badge">3</div>
      <span class="step-label">預覽與送出</span>
    </div>
  </div>

  <div class="form-grid">
    <!-- 左欄 -->
    <div class="card">
      <!-- 商品圖片上傳 -->
      <div class="section-label">商品圖片 <span class="req">*</span></div>
      <div class="image-grid" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
        <!-- 主圖 -->
        <div class="img-slot main" tabindex="0" (click)="onSlotClick(0)">
          <ng-container *ngIf="imageSlotUrls[0]; else mainPlaceholder">
            <img [src]="imageSlotUrls[0]" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />
          </ng-container>
          <ng-template #mainPlaceholder>
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor"/>
            <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor"/>
            <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="slot-label">主圖</span>
          <span class="slot-hint">(建議 800×800)</span>
          </ng-template>
        </div>
        <!-- 副圖 1~5 -->
        <div class="img-slot" tabindex="0" *ngFor="let url of imageSlotUrls.slice(1); let i = index"
        (click)="onSlotClick(i + 1)">
          <ng-container *ngIf="url; else subPlaceholder">
            <img [src]="url" style="width:100%;height:100%;object-fit:cover;border-radius:5px;" />
          </ng-container>
          <ng-template #subPlaceholder>
            <span class="plus">＋</span>
          </ng-template>
        </div>
      </div>
      <p class="img-hint">最多 5 張，支援 JPG/PNG，單張限 10MB</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple style="display:none"
      (change)="onFileChange($event)"/>

      <!-- 商品名稱 -->
      <div class="field">
        <div class="field-header">
          <label class="section-label" for="productName">商品名稱 <span class="req">*</span></label>
          <span class="char-count">{{ nameCount }}</span>
        </div>
        <input type="text" id="productName" maxlength="60" placeholder="例：Nike Air Max 90 US9 白灰配色，九成新"
        (input)="onNameInput($event)"/>
        <p class="field-hint">更精準的名稱：顏色・尺寸・型號</p>
      </div>

      <!-- 商品描述 -->
      <div class="field">
        <div class="field-header">
          <label class="section-label" for="productDesc">商品描述 <span class="req">*</span></label>
          <span class="char-count" [style.color]="descCountColor">{{ descCount }}</span>
        </div>
        <textarea id="productDesc" maxlength="500" placeholder="請詳細描述商品狀況、購入時間、附帶配件、不議價原因等…"
        (input)="onDescInput($event)"></textarea>
        <p class="field-hint">至少填寫 30 字</p>
      </div>
    </div>

    <!-- 右欄 -->
    <div class="right-panel">
      <div class="card">
        <!-- Category -->
        <div class="field">
          <div class="section-label">分類 <span class="req">*</span></div>
           <select (change)="onCatMainChange($event)"
            [class.selected]="state.catMain !== ''">
            <option value="" disabled selected>請選擇分類</option>
            <option *ngFor="let cat of catOptions" [value]="cat">{{ cat }}</option>
          </select>
          <select (change)="onCatSubChange($event)"
            [value]="state.catSub"
            [class.selected]="state.catSub !== ''"
            style="margin-top:8px;">
            <option value="" disabled selected>請選擇</option>
            <option *ngFor="let sub of subCats" [value]="sub">{{ sub }}</option>
          </select>
        </div>

        <!-- 商品狀況 -->
        <div class="field">
          <div class="section-label">商品狀況 <span class="req">*</span></div>
          <select (change)="onConditionChange($event)"
            [class.selected]="state.condition !== ''">
            <option value="" disabled selected>請選擇商品狀況</option>
            <option>全新</option>
            <option>九成新以上</option>
            <option>二手</option>
          </select>
        </div>

        <!-- 價格 -->
        <div class="field price-field">
          <div class="field-header">
            <label class="section-label" for="productPrice">價格 <span class="req">*</span></label>
          </div>
          <input type="number" id="productPrice" min="0" placeholder="請輸入價格"
          (input)="onPriceInput($event)"/>
          <p class="field-hint">單位：新台幣（元）</p>
        </div>

        <!-- 關鍵字 -->
        <div class="field">
          <div class="section-label">
            關鍵字 <span class="optional">（選填）</span>
          </div>
          <div class="tags-input-wrapper" tabindex="-1" (click)="tagInputRef.focus()">
           <span class="tag" *ngFor="let tag of state.tags">
              {{ tag }}
              <button class="tag-remove" (click)="removeTag(tag)">×</button>
            </span>
            <input class="tags-input" #tagInputRef
              [placeholder]="tagPlaceholder"
              [disabled]="tagInputDisabled"
              [(ngModel)]="tagInputValue"
              (keydown)="onTagKeydown($event)" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 最下排按鈕 -->
  <div class="form-footer">
    <div class="button-group">
      <button class="btn btn-outline" type="button" (click)="saveDraft()">儲存草稿</button>
      <button class="btn btn-outline" type="button" (click)="loadDraft()">載入草稿</button>
    </div>
    <button class="btn btn-primary" type="button"
    [class.disabled]="isNextDisabled" (click)="onNextClick()">下一步：預覽與送出
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>

<div class="toast" [class.show]="toastVisible">{{ toastText }}</div>

<script src="main.js"></script>
