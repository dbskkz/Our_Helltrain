<div class="page-wrapper">
  <p class="page-title">商品上架</p>

  <!-- 操作步驟 -->
  <div class="stepper">
    <div class="step active"
    [class.active]="activeStep === 1"
    [class.inactive]="activeStep !== 1"
    (click)="setStep(1)" data-step="1">
      <div class="step-badge">1</div>
      <span class="step-label">商品資訊</span>
    </div>
    <div class="step inactive"
    [class.active]="activeStep === 2"
    [class.inactive]="activeStep !== 2"
    (click)="setStep(2)" data-step="2">  <!-- [class.active]="activeStep === 2" 變成 true → 加上 active-->
      <div class="step-badge">2</div>
      <span class="step-label">價格與分類</span>
    </div>
    <div class="step inactive"
    [class.active]="activeStep === 3"
    [class.inactive]="activeStep !== 3"
    (click)="setStep(3)" data-step="3">
      <div class="step-badge">3</div>
      <span class="step-label">預覽與送出</span>
    </div>
  </div>

  <div class="form-grid">
    <!-- 左欄 -->
    <div class="card">
      <!-- 商品圖片上傳 -->
      <div class="section-label">商品圖片 <span class="req">*</span></div>
      <div class="image-grid" id="imageGrid">
        <div class="img-slot main" id="mainSlot" tabindex="0">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor"/>
            <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor"/>
            <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="slot-label">主圖</span>
          <span class="slot-hint">(建議 800×800)</span>
        </div>
        <div class="img-slot" tabindex="0"><span class="plus">＋</span></div>
        <div class="img-slot" tabindex="0"><span class="plus">＋</span></div>
        <div class="img-slot" tabindex="0"><span class="plus">＋</span></div>
        <div class="img-slot" tabindex="0"><span class="plus">＋</span></div>
        <div class="img-slot" tabindex="0"><span class="plus">＋</span></div>
      </div>
      <p class="img-hint">最多 5 張，支援 JPG/PNG，單張限 10MB</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple style="display:none" />

      <!-- 商品名稱 -->
      <div class="field">
        <div class="field-header">
          <label class="section-label" for="productName">商品名稱 <span class="req">*</span></label>
          <span class="char-count" id="nameCount">0/60</span>
        </div>
        <input type="text" id="productName" maxlength="60" placeholder="例：Nike Air Max 90 US9 白灰配色，九成新" />
        <p class="field-hint">更精準的名稱：顏色・尺寸・型號</p>
      </div>

      <!-- 商品描述 -->
      <div class="field">
        <div class="field-header">
          <label class="section-label" for="productDesc">商品描述 <span class="req">*</span></label>
          <span class="char-count" id="descCount">0/500</span>
        </div>
        <textarea id="productDesc" maxlength="500" placeholder="請詳細描述商品狀況、購入時間、附帶配件、不議價原因等…"></textarea>
        <p class="field-hint">建議至少填寫 30 字</p>
      </div>
    </div>

    <!-- 右欄 -->
    <div class="right-panel">
      <div class="card">
        <!-- Category -->
        <div class="field">
          <div class="section-label">分類 <span class="req">*</span></div>
          <select id="catMain">
            <option value="" disabled selected>請選擇分類</option>
            <option>書籍</option>
            <option>科系用品</option>
            <option>生活用品</option>
            <option>3C電子</option>
            <option>家具家電</option>
            <option>其他</option>
          </select>
          <select id="catSub" style="margin-top:8px;">
            <option value="" disabled selected>請選擇</option>
          </select>
        </div>

        <!-- 商品狀況 -->
        <div class="field">
          <div class="section-label">商品狀況 <span class="req">*</span></div>
          <select id="condition">
            <option value="" disabled selected>請選擇商品狀況</option>
            <option>全新</option>
            <option>九成新以上</option>
            <option>二手</option>
          </select>
        </div>

        <!-- 關鍵字 -->
        <div class="field">
          <div class="section-label">
            關鍵字 <span class="optional">（選填）</span>
          </div>
          <div class="tags-input-wrapper" id="tagsWrapper" tabindex="-1">
            <span class="tag" data-value="Nike">Nike <button class="tag-remove">×</button></span>
            <span class="tag" data-value="球鞋">球鞋 <button class="tag-remove">×</button></span>
            <input class="tags-input" id="tagInput" placeholder="輸入標籤後按 Enter，最多 5 個" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 最下排按鈕 -->
  <div class="form-footer">
    <button class="btn btn-outline" id="btnSaveDraft" type="button">儲存草稿</button>
    <button class="btn btn-primary disabled" id="btnNext" type="button">
      下一步：價格與分類
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="main.js"></script>
