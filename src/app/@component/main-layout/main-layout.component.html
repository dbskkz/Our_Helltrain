<div class="father">

  <app-top-nav  class="header"></app-top-nav>
  @if(!isLogIn() && !isClose){
    <app-sub-bar (outputClose)="isClose = $event"></app-sub-bar>
  }

  <div class="main-content" >
    <main>
      <router-outlet></router-outlet>
      <button class="scrollToTop" (click)="scrollToTop()"
      [class.active]>
        <lucide-icon [name]="ArrowUpIcon" [size]="28"></lucide-icon>
      </button>
    </main>
  </div>

  <!-- footer -->
  <app-footer></app-footer>

</div>
