<main class="content">
  <header class="favorites-header">
    <h3 class="favorites-title">收藏的商品 ({{productAmount}})</h3>
    <button class="btn-clear-all" type="button">
      <lucide-icon [img]="Trash2Icon" size="18"></lucide-icon>
      <span>清空收藏</span>
    </button>
  </header>

  <p class="favorites-subtitle">收藏的商品會顯示於此，方便您快速瀏覽與管理。</p>

  <ul class="favorites-list">
    @for (item of products; track $index) {
    <li class="favorite-item">
      <div class="item-prefix">
        <input type="checkbox" class="item-checkbox">
      </div>

      <div class="item-img">
        <!-- <img src=""
          alt="商品照片"> -->
      </div>

      <div class="item-content">
        <h5 class="item-title">{{item.title}}</h5>

        <div class="seller-info">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR54AYQT76piHk4cPNEzhiwKO9cqRr0nk2JSg&s"
           class="seller-avatar" alt="賣家頭像">
           <span>優良賣家</span>
          <span class="seller-name">{{item.sellerName}}</span>
          <button class="btn-chat" title="和同學聊聊!">
            <lucide-icon [img]="MessageCircleIcon" size="16"></lucide-icon>
          </button>
        </div>

        <div class="location-info">
          <lucide-icon [img]="MapPinIcon" size="14"></lucide-icon>
          <span>{{item.university}} · {{item.location}}</span>
        </div>

      </div>

      <div class="item-price">
        <span class="price-amount">{{item.price}}</span>
        <span class="price-currency">$</span>
      </div>

    </li>
    }
  </ul>

  <section class="favorites-reminder">
    <div class="reminder-icon">
      <lucide-icon [img]="HeartIcon"></lucide-icon>
    </div>
    <div class="reminder-text">
      <strong>小提醒</strong>
      <p>收藏的商品不代表保留，建議盡快聯繫賣家確認商品狀況！</p>
    </div>
    <img src="path/to/illustration.png" alt="裝飾圖" class="reminder-img">
  </section>
</main>
