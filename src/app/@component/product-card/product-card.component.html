<section class="product">
  <section class="product-list">
    @for (item of displayedProducts; track item.title) {
      <div class="card" type="button" [routerLink]="['/product_page', item.productId]">
        <img [src]="item.imgUrl" class="card-img-top" alt="...">
        <div class="card-body">
          <div class="head">
            <h6 class="title">{{ item.title }}</h6>
            <h5 class="price-container">
              <span class="currency-symbol">$</span>
              <span class="amount">{{ item.price }}</span>
            </h5>
          </div>

          <div class="toe">

            <div class="meta-info">
              <span class="location" >
                <lucide-icon [img]="MapPinIcon" size="12"></lucide-icon>
                {{ formatLocation(item.location) }} · {{ formatDate(item.time) }}
              </span>
            </div>

            <div class="user-info">
              <div class="picture"></div>
              <span class="user-name" [title]="item.user.userName">{{item.user.userName}}</span>
              <span class="user-university" [title]="item.user.university">{{item.user.university}}</span>
            </div>

          </div>


        </div>
      </div>
    }
  </section>


</section>
