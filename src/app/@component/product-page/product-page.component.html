<div class="page-wrapper">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#">首頁</a>
    <span class="sep">›</span>
    <a href="#">書籍</a>
    <span class="sep">›</span>
    <span class="current">小說</span>
    <a href="#" class="back-btn">← 回上一頁</a>
  </div>

  <div class="product-main">

    <!--左邊區塊 -->
    <div class="gallery">
      <div class="main-image-container">
        <img
          [src]="selectedImage"
          [alt]="product.title"
          class="main-image"
        />
      </div>
      <div class="thumbnails">
        <div
          *ngFor="let img of product.images; let i = index"
          class="thumbnail"
          [class.active]="selectedImageIndex === i"
          (click)="selectImage(i)"
        >
          <img *ngIf="img" [src]="img" [alt]="'圖片 ' + (i + 1)" />
          <div *ngIf="!img" class="thumb-placeholder"></div>
        </div>
      </div>
    </div>

    <!-- 右邊區塊 -->
    <div class="product-info">
      <div class="title-row">
        <h1 class="product-title">{{ product.title }}</h1>
        <button class="seller-btn star">
          <span class="star-icon">★</span> 賣家帳號
        </button>
      </div>

      <table class="info-table">
        <tr>
          <th>地區</th>
          <td>{{ product.region }}</td>
        </tr>
        <tr>
          <th>學校</th>
          <td>{{ product.school }}</td>
        </tr>
        <tr>
          <th>賣家</th>
          <td>
            <a href="#" class="seller-link">{{ product.seller }}</a>
            <button class="chat-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
          </td>
        </tr>
      </table>

      <!-- Condition Tags -->
      <div class="condition-section">
        <span class="tag">二手書</span>
        <span class="tag">{{ product.condition }}</span>
        <p class="condition-note">{{ product.conditionNote }}</p>
      </div>

      <!-- Price & Buttons -->
      <div class="purchase-row">
        <span class="price">{{ product.price | currency:'TWD':'symbol':'1.0-0' }}</span>
        <div class="purchase-actions">
          <button class="btn-cart" (click)="addToCart()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            加入購物車
          </button>
          <button class="btn-buy" (click)="buyNow()">
            <span class="coin-icon">🪙</span> 直接購買
          </button>
        </div>
      </div>

      <!-- Safety Notice -->
      <div class="safety-box">
        <div class="safety-header">
          <span class="shield-icon">🛡️</span>
          <strong>交易安全有保障</strong>
        </div>
        <ul class="safety-list">
          <li *ngFor="let item of product.safetyFeatures">
            <span class="check">✓</span> {{ item }}
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Product Description -->
  <div class="description-section">
    <h2 class="desc-title">商品說明</h2>
    <div class="desc-content">
      <p *ngFor="let para of product.description">{{ para }}</p>
    </div>
  </div>

</div>
