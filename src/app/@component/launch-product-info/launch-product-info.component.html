<div class="page-wrapper">
  <p class="page-title">商品上架</p>

  <div class="stepper">
    <div class="step active">
      <div class="step-badge">1</div>
      <span class="step-label">地點與分類</span>
    </div>
    <div class="step">
      <div class="step-badge">2</div>
      <span class="step-label">資訊與價格</span>
    </div>
    <div class="step">
      <div class="step-badge">3</div>
      <span class="step-label">預覽與送出</span>
    </div>
  </div>

  <div class="form-vertical-container">

    <div class="field">
      <div class="section-label">商品所在地點 <span class="req">*</span></div>
      <div class="select-group">
        <select (change)="onRegionChange($event)" [value]="state.region"
          [class.selected]="state.region !== ''"
          [class.error]="touched.region && state.region === ''">
          <option value="" disabled selected>請選擇縣市</option>
          <option *ngFor="let region of regionOptions" [value]="region">{{ region }}</option>
        </select>
      </div>
    </div>

    <div class="field">
      <div class="section-label">額外可面交地區 <span class="optional">（選填）</span></div>
        <div class="checkbox-group location-checkbox-group">
          <label class="checkbox-label" *ngFor="let region of regionOptions">
          <input type="checkbox"
           [checked]="state.locationRegions.includes(region)"
           (change)="onLocationRegionChange($event, region)" />
          <span>{{ region }}</span>
          </label>
        </div>
    </div>

    <div class="field">
      <div class="section-label">建議面交年級 <span class="req">*</span> <span class="hint-text">（可複選）</span></div>
      <div class="checkbox-group" [class.error]="touched.grades && state.grades.length === 0">
        <label class="checkbox-label" *ngFor="let grade of gradeList">
          <input type="checkbox"
                 [checked]="state.grades.includes(grade)"
                 (change)="onGradeChange($event, grade)" />
          <span>{{ grade }}</span>
        </label>
      </div>
    </div>

    <div class="field">
      <div class="section-label">分類 <span class="req">*</span></div>
      <div class="radio-group" [class.error]="touched.catMain && state.catMain === ''">
        <label class="radio-label" *ngFor="let cat of catOptions">
        <input type="radio" name="catMain"
             [value]="cat"
             [checked]="state.catMain === cat"
             (change)="onCatMainChange($event, cat)" />
        <span>{{ cat }}</span>
        </label>

    <!-- 新增類別：radio + 文字輸入框 -->
        <label class="radio-label">
        <input type="radio" name="catMain" value="__custom__"
         [checked]="state.catMain === '__custom__' || isCustomCat()"
         (change)="onAddCatRadioSelect()" />
        <span>新增類別</span>
        <input *ngIf="state.catMain === '__custom__' || isCustomCat()"
          class="cat-custom-input" type="text" placeholder="輸入類別"
         [(ngModel)]="customCatInput"
         (ngModelChange)="onCustomCatInput()"
         (click)="$event.stopPropagation()" />
        </label>
      </div>
    </div>

    <div class="field">
      <div class="section-label">商品狀況 <span class="req">*</span></div>
      <select (change)="onConditionChange($event)" [value]="state.condition"
        [class.selected]="state.condition !== ''"
        [class.error]="touched.condition && state.condition === ''">
        <option value="" disabled selected>請選擇商品狀況</option>
        <option>全新</option>
        <option>近全新</option>
        <option>輕度使用</option>
        <option>中度使用</option>
        <option>重度使用</option>
      </select>
    </div>
  </div>

  <div class="form-footer">
  <!-- 儲存草稿 -->
  <button class="btn btn-draft" type="button" (click)="onSaveDraft()">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    儲存草稿
  </button>
  <!-- 下一步 -->
    <button class="btn btn-primary" type="button" [class.disabled]="isNextDisabled" (click)="onNextClick()">
      下一步：商品資訊
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" [class.show]="toastVisible">{{ toastText }}</div>
