<h2 mat-dialog-title>使用者資料</h2>

<mat-dialog-content>
  <div class="form-body">

    <div class="user-avatar-wrap">
      <img
        class="dialog-avatar"
        [src]="data.avatarUrl"
        [alt]="data.name"
      />
    </div>

    <div class="form-row">
      <span class="form-label">ID：</span>
      <span>{{ data.id }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">姓名：</span>
      <span>{{ data.name }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">Email：</span>
      <span>{{ data.email }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">電話：</span>
      <span>{{ data.phone }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">地區：</span>
      <span>{{ data.location }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">學校：</span>
      <span>{{ data.department }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">狀態：</span>
      <span>{{ data.status }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">驗證日期：</span>
      <span>{{ data.studentVerifiedAt }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">信用等級：</span>
      <span>{{ data.goodLevel }}</span>
    </div>

    <div class="form-row">
      <span class="form-label">簡介：</span>
      <span>{{ data.msg }}</span>
    </div>

  </div>
</mat-dialog-content>

<mat-dialog-actions>
  <button class="btn btn-cancel" mat-dialog-close>
    關閉
  </button>
</mat-dialog-actions>
