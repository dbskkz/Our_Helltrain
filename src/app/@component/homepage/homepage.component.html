<main class="content">

  <!-- 輪播公告 -->
  <section class="Carousel-Notification">
    <div id="carouselExample" class="carousel slide">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="img/banner.jpg" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="img/banner2.png" class="d-block w-100" alt="...">
        </div>
        <!-- <div class="carousel-item">
          <img src="https://i.ytimg.com/vi/ujyJRxAKpVE/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBebG7kjhJPKm6HDvNGRI-isk7CBg" class="d-block w-100" alt="...">
        </div> -->
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </section>

  <section class="category-wrapper" >

    <button class="nav-btn left" (click)="scrollLeft()">
      ←
    </button>

    <section class="popular-categories" #categoryScroll>
      @for (item of categories; track $index) {
        <div class="category-item" type="button" (click)="goToProductListById(item.value)">
          <lucide-icon [name]="item.icon" [size]="60"></lucide-icon> <p>{{item.label}}</p>
        </div>
      }
    </section>

    <button class="nav-btn right" (click)="scrollRight()">
      →
    </button>

  </section>

  <div class="subtitle">
    <h5>
      <mark>
        為你推薦
      </mark>
    </h5>
  </div>

<section class="thebody">

  <app-product-card [products]="homeProducts"></app-product-card>
  <div class="view-more-wrapper">
    <button class="view-more" (click)="goToProductListById('all')">查看更多</button>
  </div>

</section>
