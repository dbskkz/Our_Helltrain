<main class="content">

  <!-- 輪播公告 -->
  <section class="Carousel-Notification">
    <div id="carouselExample" class="carousel slide">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://static-cdn.nextapple.tw/prod/2026-03/679E1F881C36E8BB711C3921C0ADDE2E/d897edebc2e44a31482aac2dd7f81a6a_750.webp" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="https://img.91app.com/webapi/imagesV3/Original/SalePage/11510454/0/639050225696130000?v=1" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="https://i.ytimg.com/vi/ujyJRxAKpVE/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBebG7kjhJPKm6HDvNGRI-isk7CBg" class="d-block w-100" alt="...">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </section>

  <div class="content-toolbar">
    <div class="applied-filters">
      <lucide-icon [img]="FilterIcon" size="18"></lucide-icon>
      <span class="label">正在查看：</span>
      <div class="filter-tag">
        全部商品
      </div>
    </div>

    <div class="sorting-dropdown">
      <div class="rearrange">
        <lucide-icon [img]="ArrowUpDownIcon" size="18"></lucide-icon>
      </div>

      <div class="sort-selection">

        <select >
          <option value="sort-newest">上架順序</option>
          <option value="sort-price">價格</option>
          <option value="sort-seller">優質賣家</option>
        </select>
        <lucide-icon [img]="ChevronDownIcon" size="16"></lucide-icon>

      </div>
    </div>

  </div>

  <section class="product">


  <section class="product-list">
    @for (item of products; track item.title) {
      <div class="card">
        <img src="https://img.freepik.com/free-photo/smooth-gray-background-with-high-quality_53876-124606.jpg?semt=ais_hybrid&w=740&q=80" class="card-img-top" alt="...">
        <div class="card-body">
          <h6 class="title">{{ item.title }}</h6>
          <h5 class="price">${{ item.price }}</h5>

          <!-- <div class="meta-info">
            <span class="location">
              <lucide-icon [img]="MapPinIcon" size="12"></lucide-icon>
              {{ item.location }} · {{item.university}}
            </span>

            <span class="time">
              {{ item.time }}
            </span>
          </div> -->

          <div class="meta-info">
            <span class="location">
              <lucide-icon [img]="MapPinIcon" size="12"></lucide-icon>
              {{ item.location }} · {{item.university}}
            </span>
            <span class="time">{{ item.time }}</span>
          </div>

          <hr class="divider">

          <div class="user-info">
            <div class="picture"></div>
            <span class="department">生科吉娃娃</span>
          </div>

        </div>
      </div>
    }
  </section>
  <button class="view-more">查看更多</button>
   </section>

</main>
