<div class="search-bar-wrapper">
  <div class="text-search-wrapper">
    <lucide-icon [img]="SearchIcon" class="icon" (click)="onSearch()"></lucide-icon>
    <input type="text"
      placeholder="商品名稱、地區、商品種類等關鍵字..."
      [(ngModel)]="keyword"
      (keyup.enter)="onSearch()">
  </div>

  <div class="filter-item" (click)="toggleFilter()">
    <lucide-icon [img]="FilterIcon" class="icon" size="17"></lucide-icon>
    <p>更多篩選條件</p>
  </div>

  @if (isFilterOpen) {
    <div class="modal-overlay" (click)="isFilterOpen = false"></div>

    <div class="filter-modal">
      <div class="filter-title">
        <h5>更多搜尋條件</h5>
        <div class="close-btn" (click)="isFilterOpen = false">✕</div>
      </div>

      <div class="filter-body">
        <div class="filter-section">
          <p class="section-label">價格範圍</p>
          <div class="price-inputs">
            <input type="number" placeholder="最低價格" class="price-input" [(ngModel)]="filterForm.minPrice">
            <span class="divider">-</span>
            <input type="number" placeholder="最高價格" class="price-input" [(ngModel)]="filterForm.maxPrice">
          </div>
        </div>

        <div class="filter-section">
          <p class="section-label">商品類型</p>
          <div class="category-grid">
            @for (item of filterForm.categories; track $index) {
              <label class="chip">
                <input type="checkbox" [(ngModel)]="item.selected">
                {{ item.label }}
              </label>
            }
          </div>
        </div>

        <div class="filter-section">
          <p class="section-label">商品新舊程度</p>
          <select class="form-select" aria-label="商品狀態">
            <option value="">商品狀態</option>
            @for (item of filterForm.conditions; track $index) {
              <option [value]="item.value">{{ item.label }}</option>
            }
          </select>
        </div>

        <div class="filter-section">
          <p class="section-label">年級</p>
          <div class="category-grid">
            @for (item of filterForm.degree; track $index) {
              <label class="chip">
                <input type="checkbox" [(ngModel)]="item.selected">
                {{ item.label }}
              </label>
              @if (item.label === '學士' && item.selected) {
                @for (child of item.children; track $index) {
                  <label class="chip">
                    <input type="checkbox" [(ngModel)]="child.selected">
                    {{ child.label }}
                  </label>
                }
              }
            }
          </div>
        </div>

        <div class="filter-section">
          <p class="section-label">適用學群</p>
          <select class="form-select" aria-label="適用學群">
            <option value="">適用學群</option>
            @for (item of filterForm.academic; track $index) {
              <option [value]="item.value">{{ item.name }}</option>
            }
          </select>
        </div>

        <div class="filter-section">
          <p class="section-label">圖片搜尋</p>
          <div class="upload-area">
            <lucide-icon [img]="UploadIcon"></lucide-icon>
            <p>選擇檔案或將檔案拖放到這裡</p>
          </div>
        </div>
      </div>

      <div class="filter-footer">
        <button type="button" class="btn btn-light reset" (click)="resetFilters()">取消</button>
        <button type="button" class="btn btn-light" (click)="applyFilters()">套用篩選設定</button>
      </div>
    </div>
  }
</div>
