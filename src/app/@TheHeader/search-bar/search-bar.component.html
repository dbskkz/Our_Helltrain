<div class="search-bar-wrapper">
  <div class="text-search-wrapper">
    <lucide-icon [img]="SearchIcon" class="icon"></lucide-icon>
    <input type="text" placeholder="搜尋書籍、商品、分類或學校...">
  </div>

  <!-- <div class="category-filter-wrapper">
    <div class="filter-item type-filter">
      <lucide-icon [img]="ShapesIcon" class="icon" size="16"></lucide-icon>
      <select><option>選擇分類</option></select>
    </div>

    <div class="filter-item location-filter">
      <lucide-icon [img]="MapPinIcon" class="icon" size="16"></lucide-icon>
      <select><option>選擇地區</option></select>
    </div>
  </div> -->

  <div class="filter-item" (click) = "toggleFilter()">
    <lucide-icon [img]="FilterIcon" class="icon" size="17"></lucide-icon>
    <p>更多篩選條件</p>
  </div>

  @if(isFilterOpen) {
  <div class="modal-overlay" (click)="isFilterOpen = false"></div>

  <div class="filter-modal">
    <div class="filter-title">
      <h5>更多搜尋條件</h5>
      <div class="close-btn" (click)="isFilterOpen = false">✕</div>
    </div>

    <div class="filter-body">
      <div class="filter-section">
        <p class="section-label">價格範圍</p>
        <div class="price-inputs">
          <input type="number" placeholder="最低價格" class="price-input" [(ngModel)]="filterForm.minPrice">
          <span class="divider">-</span>
          <input type="number" placeholder="最高價格" class="price-input" [(ngModel)]="filterForm.maxPrice">
        </div>
      </div>

      <div class="filter-section">
        <p class="section-label">商品類型</p>

        <div class="category-grid">
          @for (item of filterForm.categories; track $index) {
            <label class="chip"><input type="checkbox" [(ngModel)]="item.selected">{{item.label}}</label>
          }
        </div>
      </div>

      <div class="filter-section">
         <p class="section-label">圖片搜尋</p>
         <div class="upload-area">
            <lucide-icon [img]="UploadIcon"></lucide-icon>
            <p>選擇檔案或將檔案拖放到這裡</p>
         </div>
      </div>
    </div>

    <div class="filter-footer">
      <button class="btn-reset"
      (click)="resetFilters()"
      type="button"
      class="btn btn-light reset">重設</button>
      <button class="btn-submit"
      (click)="applyFilters()"
      type="button"
      class="btn btn-light">套用篩選</button>
    </div>
  </div>
}
</div>
