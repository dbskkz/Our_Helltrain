<div class="search-bar-wrapper">
  <div class="text-search-wrapper">
    <lucide-icon [img]="SearchIcon" class="icon" (click) = "onSearch()"></lucide-icon>
    <input type="text"
    placeholder="商品名稱、地區、商品種類等關鍵字..."
    [(ngModel)]="keyword"
    (keyup.enter)="onSearch()">
  </div>

  <div class="filter-item" (click) = "toggleFilter()">
    <lucide-icon [img]="FilterIcon" class="icon" size="17"></lucide-icon>
    <p>更多篩選條件</p>
  </div>

  @if(isFilterOpen) {
  <div class="modal-overlay" (click)="isFilterOpen = false"></div>

  <form class="filter-modal">
    <div class="filter-title">
      <h5>更多搜尋條件</h5>
      <div class="close-btn" (click)="isFilterOpen = false">✕</div>
    </div>

    <div class="filter-body">
      <fieldset class="filter-section">
        <legend class="section-label">價格範圍</legend>
        <div class="price-inputs">
          <input type="number" placeholder="最低價格" class="price-input" [(ngModel)]="filterForm.minPrice">
          <span class="divider">-</span>
          <input type="number" placeholder="最高價格" class="price-input" [(ngModel)]="filterForm.maxPrice">
        </div>
      </fieldset>

      <fieldset class="filter-section">
        <legend class="section-label">商品類型</legend>

        <div class="category-grid">
          @for (item of filterForm.categories; track $index) {
            <label class="chip"><input type="checkbox" [(ngModel)]="item.selected">{{item.label}}</label>
          }
        </div>
      </fieldset>

      <fieldset class="filter-section">
        <legend class="section-label">商品新舊程度</legend>
        <select class="form-select" aria-label="Default select example">
          <option selected>商品狀態</option>
          <option value="1">全新</option>
          <option value="2">近全新</option>
          <option value="3">輕度使用</option>
          <option value="3">中度使用</option>
          <option value="3">重度使用</option>
        </select>
      </fieldset>

      <fieldset class="filter-section">
         <legend class="section-label">年級</legend>
         <!-- TODO: 學士 ( 大一 大二 大三 大四以上 ) 碩士 博士 不分年級-->
          <div class="category-grid">
          @for (item of filterForm.degree; track $index) {
            <label class="chip"><input type="checkbox" [(ngModel)]="item.selected">{{item.label}}</label>
            @if (item.label == "學士" && item.selected) {
              @for (banana of item.children; track $index) {
                <label class="chip"><input type="checkbox" [(ngModel)]="banana.selected">{{banana.label}}</label>
              }
            }
          }
          </div>
      </fieldset>

      <fieldset class="filter-section">
        <legend class="section-label">適用學群</legend>
         <select class="form-select"
         aria-label="Default select example"
         >
          <option selected>適用學群</option>
          @for (item of filterForm.academic; track $index) {
            <option [(ngModel)]="item.value">{{item.name}}</option>
          }
        </select>
      </fieldset>

      <fieldset class="filter-section">
         <legend class="section-label">圖片搜尋</legend>
         <div class="upload-area">
            <lucide-icon [img]="UploadIcon" size="24"></lucide-icon>
            <p>選擇檔案或將檔案拖放到這裡</p>
         </div>
      </fieldset>

    </div>

    <div class="filter-footer">
      <button class="btn-reset"
      (click)="resetFilters()"
      type="button"
      class="btn btn-light reset">取消</button>
      <button class="btn-submit"
      (click)="applyFilters()"
      type="button"
      class="btn btn-light">套用篩選設定</button>
    </div>
  </form>
}
</div>
